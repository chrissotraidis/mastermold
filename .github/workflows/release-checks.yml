name: Release Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit public source
        run: npm run privacy:audit

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test tests

      - name: Build and audit artifact
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev
